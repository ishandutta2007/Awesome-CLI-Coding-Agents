<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0c0d2b"/>
      <stop offset="100%" stop-color="#140624"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2"/>
      <stop offset="50%" stop-color="#4a00e0"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Background Decorative Glowing Orbs -->
  <circle cx="200" cy="100" r="150" fill="url(#glowGrad)" filter="url(#softGlow)" opacity="0.3"/>
  <circle cx="1000" cy="300" r="180" fill="#8a2be2" filter="url(#softGlow)" opacity="0.15"/>

  <!-- Grid Pattern Overlay -->
  <g opacity="0.08">
    <path d="M 0,40 L 1200,40 M 0,80 L 1200,80 M 0,120 L 1200,120 M 0,160 L 1200,160 M 0,200 L 1200,200 M 0,240 L 1200,240 M 0,280 L 1200,280 M 0,320 L 1200,320 M 0,360 L 1200,360" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Coding & Agent Abstract Art (Right Side) -->
  <g transform="translate(850, 200)" opacity="0.85">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="10 15 20 10" filter="url(#glow)"/>
    <!-- Inner Rings & Nodes -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00d2ff" stroke-width="1" stroke-dasharray="5 5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8a2be2" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="#00d2ff" filter="url(#glow)"/>
    
    <!-- Connected Agent Nodes -->
    <line x1="0" y1="0" x2="-70" y2="-70" stroke="#00f2fe" stroke-width="2"/>
    <circle cx="-70" cy="-70" r="8" fill="#00f2fe"/>
    <line x1="0" y1="0" x2="90" y2="-40" stroke="#8a2be2" stroke-width="2"/>
    <circle cx="90" cy="-40" r="12" fill="#8a2be2"/>
    <line x1="0" y1="0" x2="50" y2="80" stroke="#4a00e0" stroke-width="1.5"/>
    <circle cx="50" cy="80" r="6" fill="#4a00e0"/>
    <line x1="0" y1="0" x2="-80" y2="50" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="-80" cy="50" r="10" fill="#00f2fe"/>
  </g>

  <!-- Title & Subtitle -->
  <g transform="translate(80, 160)">
    <!-- Terminal Prompt Decorator -->
    <text x="0" y="0" font-family="'Courier New', Courier, monospace" font-size="32" font-weight="bold" fill="#00d2ff" filter="url(#glow)">$&gt;</text>
    
    <!-- Main Title -->
    <text x="60" y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="url(#primaryGrad)" filter="url(#glow)">AWESOME CLI</text>
    <text x="60" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff">CODING AGENTS</text>
    
    <!-- Subtitle / Tagline -->
    <text x="60" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="300" fill="#a0aec0" letter-spacing="1">
      Curated AI-Powered IDEs, Agents, TUIs &amp; Coding Ecosystems
    </text>
  </g>

  <!-- Decorative CLI/Terminal Bracket -->
  <path d="M 40,80 L 20,80 L 20,320 L 40,320" fill="none" stroke="#8a2be2" stroke-width="4" opacity="0.6"/>
</svg>
